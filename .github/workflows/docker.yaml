name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".config/nextest.toml"
      - "crates/**"
      - "libs/**"
      - "data/meta/**"
      - ".dockerignore"
      - "Dockerfile"
      - "app/**"
      - "scripts/**"
      - ".github/workflows/backend.yaml"
      - ".github/workflows/frontend.yaml"
      - ".github/workflows/docker.yaml"

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runtime_image: ${{ steps.filter.outputs.runtime_image }}
      backend_workflow: ${{ steps.filter.outputs.backend_workflow }}
      frontend_workflow: ${{ steps.filter.outputs.frontend_workflow }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            runtime_image:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "libs/**"
              - "data/meta/**"
              - ".dockerignore"
              - "Dockerfile"
              - "app/**"
              - "scripts/container-smoke.mjs"
            backend_workflow:
              - ".config/nextest.toml"
              - "scripts/test.mjs"
              - ".github/workflows/backend.yaml"
            frontend_workflow:
              - "scripts/test.mjs"
              - ".github/workflows/frontend.yaml"

  backend-quality:
    needs: changes
    if: needs.changes.outputs.runtime_image == 'true' || needs.changes.outputs.backend_workflow == 'true'
    uses: ./.github/workflows/backend.yaml

  frontend-quality:
    needs: changes
    if: needs.changes.outputs.runtime_image == 'true' || needs.changes.outputs.frontend_workflow == 'true'
    uses: ./.github/workflows/frontend.yaml

  build-image:
    needs: [changes, backend-quality, frontend-quality]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.runtime_image == 'true' &&
      needs.backend-quality.result == 'success' &&
      needs.frontend-quality.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_tags: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
    env:
      LOCAL_IMAGE: litradar-ci:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and load exact image
        id: build
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          load: true
          push: false
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.LOCAL_IMAGE }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test exact image
        id: smoke
        run: |
          started_at="$(date +%s)"
          set +e
          node scripts/container-smoke.mjs "$LOCAL_IMAGE"
          status="$?"
          set -e
          echo "duration_seconds=$(( $(date +%s) - started_at ))" >> "$GITHUB_OUTPUT"
          exit "$status"

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested image tags
        id: push
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          first_tag=""
          while IFS= read -r image_tag; do
            if [[ -z "$image_tag" ]]; then
              continue
            fi
            if [[ -z "$first_tag" ]]; then
              first_tag="$image_tag"
            fi
            docker push "$image_tag"
          done <<< "$IMAGE_TAGS"
          test -n "$first_tag"
          repo_digest="$(docker image inspect "$first_tag" --format '{{index .RepoDigests 0}}')"
          test -n "$repo_digest"
          echo "digest=${repo_digest##*@}" >> "$GITHUB_OUTPUT"

      - name: Upload container smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: container-smoke-diagnostics
          path: test-results/container-smoke/
          if-no-files-found: warn
          retention-days: 14

      - name: Write container summary
        if: always()
        env:
          PUSH_RESULT: ${{ steps.push.outcome }}
          SMOKE_DURATION: ${{ steps.smoke.outputs.duration_seconds }}
          SMOKE_RESULT: ${{ steps.smoke.outcome }}
        run: |
          {
            echo "## Exact-image container gate"
            echo
            echo "- Smoke status: ${SMOKE_RESULT:-not run}"
            echo "- Smoke duration: ${SMOKE_DURATION:-n/a}s"
            echo "- Push status: ${PUSH_RESULT:-not run}"
            echo "- Security: read-only root, all capabilities dropped, no-new-privileges, tmpfs, writable data volume, and read-only key mount."
          } >> "$GITHUB_STEP_SUMMARY"

  workflow-summary:
    name: LitRadar workflow summary
    needs: [changes, backend-quality, frontend-quality, build-image]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write workflow summary
        env:
          BACKEND_RESULT: ${{ needs.backend-quality.result }}
          BUILD_RESULT: ${{ needs.build-image.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          COMMIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          FRONTEND_RESULT: ${{ needs.frontend-quality.result }}
          IMAGE_DIGEST: ${{ needs.build-image.outputs.image_digest }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository }}
          IMAGE_TAGS: ${{ needs.build-image.outputs.image_tags }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          status_label() {
            case "$1" in
              success) printf '✅ Success' ;;
              failure) printf '❌ Failure' ;;
              cancelled) printf '⏹️ Cancelled' ;;
              skipped) printf '⏭️ Skipped' ;;
              *) printf '❔ Unknown' ;;
            esac
          }

          run_url="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          commit_url="$SERVER_URL/$REPOSITORY/commit/$COMMIT_SHA"
          short_sha="${COMMIT_SHA:0:7}"

          {
            echo "# LitRadar CI Summary"
            echo
            echo "> Quality, exact-image smoke, and container delivery report."
            echo
            echo "## Pipeline"
            echo
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Change detection | $(status_label "$CHANGES_RESULT") |"
            echo "| Backend quality | $(status_label "$BACKEND_RESULT") |"
            echo "| Frontend quality | $(status_label "$FRONTEND_RESULT") |"
            echo "| Build, smoke, and push exact image | $(status_label "$BUILD_RESULT") |"
            echo
            echo "## Run"
            echo
            echo "- Run: [#$RUN_NUMBER]($run_url)"
            echo "- Commit: [$short_sha]($commit_url)"
            echo "- Branch: $REF_NAME"
            echo "- Event: $EVENT_NAME"
            echo
            echo "## Container image"
            echo
            if [[ -n "$IMAGE_DIGEST" ]]; then
              echo "- Image: $IMAGE_NAME"
              echo "- Tested and pushed digest: $IMAGE_DIGEST"
              if [[ -n "$IMAGE_TAGS" ]]; then
                echo "- Tags:"
                while IFS= read -r image_tag; do
                  if [[ -n "$image_tag" ]]; then
                    echo "  - $image_tag"
                  fi
                done <<< "$IMAGE_TAGS"
              fi
            else
              echo "No image was published by this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
