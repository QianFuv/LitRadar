name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "libs/**"
      - "data/meta/**"
      - ".dockerignore"
      - "Dockerfile"
      - "app/**"
      - ".github/workflows/backend.yaml"
      - ".github/workflows/frontend.yaml"
      - ".github/workflows/docker.yaml"

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runtime_image: ${{ steps.filter.outputs.runtime_image }}
      backend_workflow: ${{ steps.filter.outputs.backend_workflow }}
      frontend_workflow: ${{ steps.filter.outputs.frontend_workflow }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            runtime_image:
              - "Cargo.toml"
              - "Cargo.lock"
              - "crates/**"
              - "libs/**"
              - "data/meta/**"
              - ".dockerignore"
              - "Dockerfile"
              - "app/**"
            backend_workflow:
              - ".github/workflows/backend.yaml"
            frontend_workflow:
              - ".github/workflows/frontend.yaml"

  backend-quality:
    needs: changes
    if: needs.changes.outputs.runtime_image == 'true' || needs.changes.outputs.backend_workflow == 'true'
    uses: ./.github/workflows/backend.yaml

  frontend-quality:
    needs: changes
    if: needs.changes.outputs.runtime_image == 'true' || needs.changes.outputs.frontend_workflow == 'true'
    uses: ./.github/workflows/frontend.yaml

  build-image:
    needs: [changes, backend-quality, frontend-quality]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.runtime_image == 'true' &&
      needs.backend-quality.result == 'success' &&
      needs.frontend-quality.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
