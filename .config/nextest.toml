[profile.default]
fail-fast = true
retries = 0
flaky-result = "fail"
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
fail-fast = false
retries = 0
flaky-result = "fail"
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true
flaky-fail-status = "failure"
