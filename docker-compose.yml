services:
  api:
    build: .
    image: ghcr.io/qianfuv/paper-scanner-api:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data:rw
    command: ["api", "--host", "0.0.0.0", "--port", "8000", "--project-root", "/app"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  worker:
    build: .
    image: ghcr.io/qianfuv/paper-scanner-api:latest
    command: ["worker", "--project-root", "/app", "--interval-seconds", "30"]
    volumes:
      - ./data:/app/data:rw
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://api:8000/api/health/worker"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  app:
    build: ./app
    image: ghcr.io/qianfuv/paper-scanner-app:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /app/.next/cache:rw,noexec,nosuid,uid=1000,gid=1000,mode=0755,size=128m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
