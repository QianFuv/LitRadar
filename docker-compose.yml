name: litradar

services:
  litradar:
    build: .
    image: ghcr.io/qianfuv/litradar:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data:rw
    secrets:
      - litradar_key
    restart: unless-stopped
    mem_limit: 160m
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"
        compress: "true"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://127.0.0.1:8000/health/ready >/dev/null && curl --fail --silent --show-error http://127.0.0.1:8000/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

secrets:
  litradar_key:
    file: ./secrets/litradar.key
