services:
  api:
    build: .
    image: ghcr.io/qianfuv/paper-scanner-api:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - API_HOST=0.0.0.0
      - OPENALEX_API_KEY=${OPENALEX_API_KEY:-}
      - CROSSREF_MAILTO=${CROSSREF_MAILTO:-}
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-}

  app:
    build: ./app
    image: ghcr.io/qianfuv/paper-scanner-app:latest
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      - api
